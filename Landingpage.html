<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 340px;
        }
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        button {
            background-color: #dc3545; /* Clean red for logout */
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Welcome!</h1>
        <p>You have successfully logged in.</p>
        <button onclick="logout()">Logout</button>
    </div>
    <script>
        function logout() {
            // Assumes your login file is named login.html
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
